<body>

    <script>
        /**
         * RUNUP APP LOGIC
         * Handles state, time calculation, UI binding, and cross-window sync.
         */

        // --- GLOBAL STATE ---
        const AppState = {
            segments: [],
            message: '',
            showMessage: false,
            messageBg: '#ffffff',
            messageColor: '#000000'
        };

        const STORAGE_KEY = 'runup_app_state';

        function saveStateToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
        }

        function loadStateFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Fallback to parsed.schedules for older saves backwards compatibility
                    AppState.segments = parsed.segments || parsed.schedules || [];
                    AppState.message = parsed.message || '';
                    AppState.showMessage = parsed.showMessage || false;
                    AppState.messageBg = parsed.messageBg || '#ffffff';
                    AppState.messageColor = parsed.messageColor || '#000000';
                } catch(e) {}
            }
        }

        // Channel for syncing between Program and Live views
        const syncChannel = new BroadcastChannel('runup_sync_channel');
        
        // Mode detection
        const urlParams = new URLSearchParams(window.location.search);
        const isLiveView = urlParams.get('view') === 'live';

        // --- UTILS ---
        function timeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':').map(Number);
            return (parts[0] || 0) * 3600 + (parts[1] || 0) * 60 + (parts[2] || 0);
        }

        function secondsToTime(totalSeconds) {
            const isNeg = totalSeconds < 0;
            let s = Math.abs(totalSeconds);
            s = s % 86400; // Enforce 24-hour wrap
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            const formatted = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            return isNeg ? `-${formatted}` : formatted;
        }

        function getCurrentSeconds() {
            const now = new Date();
            return now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        }

        function parseMarkdown(text) {
            if (!text) return '';
            // Basic bold and italic parsing
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>');
        }

        // Calculate contrast color (black or white) dynamically based on background luminance
        function getContrastYIQ(hexcolor) {
            if (!hexcolor) return '#ffffff';
            hexcolor = hexcolor.replace("#", "");
            if (hexcolor.length === 3) {
                 hexcolor = hexcolor.split('').map(x => x + x).join('');
            }
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? '#000000' : '#ffffff';
        }

        // --- NEW FEATURES UTILS ---
        function updateFadingDigits(el, newText) {
            if (el.textContent === newText) return;
            
            // Rebuild spans if empty or layout changed
            if (el.children.length !== newText.length || !el.firstElementChild?.classList.contains('digit')) {
                el.innerHTML = '';
                for (let i = 0; i < newText.length; i++) {
                    const span = document.createElement('span');
                    span.className = 'digit';
                    span.textContent = newText[i];
                    el.appendChild(span);
                }
                return;
            }
            
            // Check individual characters to prevent flickering
            for (let i = 0; i < newText.length; i++) {
                const span = el.children[i];
                if (span.textContent !== newText[i]) {
                    span.textContent = newText[i];
                    span.classList.remove('digit-fade');
                    void span.offsetWidth; // Trigger reflow
                    span.classList.add('digit-fade');
                }
            }
        }

        function cascadeTimes(fromIndex = 1) {
            for (let i = fromIndex; i < AppState.segments.length; i++) {
                if (i > 0) {
                    AppState.segments[i].start = AppState.segments[i-1].end;
                }
                AppState.segments[i].end = secondsToTime(timeToSeconds(AppState.segments[i].start) + timeToSeconds(AppState.segments[i].duration));
            }
        }

        // --- DOM ELEMENTS ---
        const els = {
            progView: document.getElementById('program-view'),
            liveView: document.getElementById('live-view'),
            
            // Program Display
            progDisplayArea: document.getElementById('prog-display-area'),
            pTitle: document.getElementById('prog-title'),
            pClock: document.getElementById('prog-clock'),
            pCountdown: document.getElementById('prog-countdown'),
            
            // Live Display
            lTitle: document.getElementById('live-title'),
            lClock: document.getElementById('live-clock'),
            lCountdown: document.getElementById('live-countdown'),
            lNextTitle: document.getElementById('live-next-title'),
            lNextTime: document.getElementById('live-next-time'),
            lFooter: document.getElementById('live-footer'),
            lMsgContainer: document.getElementById('live-msg-container'),
            lMarquee: document.getElementById('live-marquee'),

            // Controls
            tbody: document.getElementById('table-body'),
            msgInput: document.getElementById('message-input'),
            btnShowMsg: document.getElementById('btn-show-msg'),
            colorPresets: document.querySelectorAll('.color-preset-btn'),
            btnPresent: document.getElementById('btn-present'),
            btnQuickNext: document.getElementById('btn-quick-next'),
            btnAddRow: document.getElementById('btn-add-row'),
            btnEditorMode: document.getElementById('btn-editor-mode'),
            editorContainer: document.getElementById('editor-container'),
            rawEditor: document.getElementById('raw-editor'),
            tableResponsive: document.querySelector('.table-responsive'),
            btnLoad: document.getElementById('btn-load'),
            btnExport: document.getElementById('btn-export'),
            fileInput: document.getElementById('file-input')
        };

        let lastActiveSegmentId = null;

        // --- CORE CLOCK ENGINE ---
        function updateClockLoop() {
            const nowSecs = getCurrentSeconds();
            const nowTimeStr = secondsToTime(nowSecs);
            
            // Update document window title with live clock
            document.title = nowTimeStr + (isLiveView ? "" : " • RunDown");
            
            // Update physical clocks with fading transition
            if (isLiveView) updateFadingDigits(els.lClock, nowTimeStr);
            else updateFadingDigits(els.pClock, nowTimeStr);

            // Determine current and next segment
            let currentSegment = null;
            let nextSegment = null;
            let currentCountdown = 0;

            for (let i = 0; i < AppState.segments.length; i++) {
                const seg = AppState.segments[i];
                const startSec = timeToSeconds(seg.start);
                let endSec = timeToSeconds(seg.end);

                // Cross-midnight handling
                if (endSec <= startSec) endSec += 86400;
                
                let effNowSec = nowSecs;
                if (endSec > 86400 && nowSecs < (endSec - 86400)) {
                    effNowSec += 86400;
                }

                if (effNowSec >= startSec && effNowSec < endSec) {
                    currentSegment = seg;
                    currentCountdown = endSec - effNowSec;
                    if (i + 1 < AppState.segments.length) {
                        nextSegment = AppState.segments[i + 1];
                    }
                    break;
                } else if (startSec > effNowSec && !currentSegment && !nextSegment) {
                    // Found the first upcoming segment if none is currently active
                    nextSegment = seg;
                }
            }

            // Trigger Swipe-up Animation on segment change
            if (currentSegment?.id !== lastActiveSegmentId) {
                lastActiveSegmentId = currentSegment?.id;
                [els.lTitle, els.pTitle, els.lCountdown, els.pCountdown].forEach(el => {
                    el.classList.remove('swipe-up');
                    void el.offsetWidth; // Trigger reflow
                    el.classList.add('swipe-up');
                });
            }

            // Apply background colors dynamically to the entire view body based on current segment
            const defaultBg = '#0a0a0a';
            const activeColor = currentSegment && currentSegment.color ? currentSegment.color : defaultBg;
            const contrastColor = getContrastYIQ(activeColor);
            
            if (isLiveView) {
                els.liveView.style.backgroundColor = activeColor;
                els.liveView.style.color = contrastColor;
            } else {
                els.progView.style.backgroundColor = activeColor;
                els.progView.style.color = contrastColor;
            }

            // Render Info based on View
            if (isLiveView) {
                if (currentSegment) {
                    els.lTitle.textContent = currentSegment.title;
                    els.lTitle.classList.remove('invisible');
                    updateFadingDigits(els.lCountdown, secondsToTime(currentCountdown));
                    els.lCountdown.classList.remove('invisible');
                } else {
                    els.lTitle.classList.add('invisible');
                    els.lCountdown.classList.add('invisible');
                }

                if (nextSegment) {
                    els.lNextTitle.textContent = nextSegment.title;
                    els.lNextTime.textContent = nextSegment.start.substring(0, 5); // HH:mm
                    els.lFooter.classList.remove('hidden');
                } else {
                    els.lFooter.classList.add('hidden');
                }
            } else {
                if (currentSegment) {
                    els.pTitle.textContent = currentSegment.title;
                    els.pTitle.classList.remove('invisible');
                    updateFadingDigits(els.pCountdown, secondsToTime(currentCountdown));
                    els.pCountdown.classList.remove('invisible');
                } else {
                    els.pTitle.classList.add('invisible');
                    els.pCountdown.classList.add('invisible');
                }

                // Hide quick next if there's no upcoming segment
                if (nextSegment) {
                    els.btnQuickNext.classList.remove('invisible');
                } else {
                    els.btnQuickNext.classList.add('invisible');
                }
            }

            requestAnimationFrame(updateClockLoop);
        }


        // --- PROGRAM VIEW LOGIC (Controls) ---

        function renderTable() {
            els.tbody.innerHTML = '';
            AppState.segments.forEach((seg, index) => {
                const tr = document.createElement('tr');
                tr.draggable = true;
                tr.dataset.index = index;
                
                // Enforce start time contiguity
                const isReadonly = index > 0 ? 'readonly tabindex="-1"' : '';
                const roClass = index > 0 ? 'readonly-input' : '';

                tr.innerHTML = `
                    <td><input type="time" step="1" lang="en-GB" class="table-input time-input start-input ${roClass}" value="${seg.start}" ${isReadonly} title="${index > 0 ? 'Auto-calculated sequence' : ''}"></td>
                    <td><input type="time" step="1" lang="en-GB" class="table-input time-input end-input" value="${seg.end}"></td>
                    <td><input type="text" class="table-input title-input" value="${seg.title}"></td>
                    <td><input type="time" step="1" lang="en-GB" class="table-input time-input duration-input" value="${seg.duration}"></td>
                    <td><input type="color" class="table-input color-input" value="${seg.color || '#0a0a0a'}"></td>
                    <td>
                        <div class="row-controls">
                            <button class="drag-handle" title="Drag to reorder">≡</button>
                            <button class="delete-btn" title="Delete row">✕</button>
                        </div>
                    </td>
                `;
                els.tbody.appendChild(tr);
            });
            
            // Hide export button if no segments
            if (AppState.segments.length === 0) {
                els.btnExport.classList.add('hidden');
            } else {
                els.btnExport.classList.remove('hidden');
            }
            
            attachTableListeners();
        }

        function broadcastState() {
            saveStateToStorage();
            syncChannel.postMessage({
                type: 'STATE_UPDATE',
                payload: AppState
            });
        }

        function handleDataChange(index, field, value) {
            const seg = AppState.segments[index];
            seg[field] = value;

            // Auto-calculate logic with cascading
            if (field === 'start') {
                seg.end = secondsToTime(timeToSeconds(seg.start) + timeToSeconds(seg.duration));
                cascadeTimes(index + 1);
            } else if (field === 'duration') {
                seg.end = secondsToTime(timeToSeconds(seg.start) + timeToSeconds(seg.duration));
                cascadeTimes(index + 1);
            } else if (field === 'end') {
                let endSecs = timeToSeconds(seg.end);
                let startSecs = timeToSeconds(seg.start);
                if (endSecs < startSecs) endSecs += 86400; // Cross-midnight adjustment
                seg.duration = secondsToTime(endSecs - startSecs);
                cascadeTimes(index + 1);
            }
            
            // We do not re-render full table on color change so the input doesn't lose focus while dragging picker
            if (field !== 'color') {
                renderTable();
            }
            
            broadcastState();
        }

        function attachTableListeners() {
            // Input changes
            els.tbody.querySelectorAll('tr').forEach((tr, index) => {
                const startIn = tr.querySelector('.start-input');
                const endIn = tr.querySelector('.end-input');
                const titleIn = tr.querySelector('.title-input');
                const durIn = tr.querySelector('.duration-input');
                const colorIn = tr.querySelector('.color-input');

                startIn.addEventListener('change', (e) => handleDataChange(index, 'start', e.target.value));
                endIn.addEventListener('change', (e) => handleDataChange(index, 'end', e.target.value));
                titleIn.addEventListener('change', (e) => handleDataChange(index, 'title', e.target.value));
                durIn.addEventListener('change', (e) => handleDataChange(index, 'duration', e.target.value));
                colorIn.addEventListener('input', (e) => handleDataChange(index, 'color', e.target.value));

                // Delete
                tr.querySelector('.delete-btn').addEventListener('click', () => {
                    AppState.segments.splice(index, 1);
                    renderTable();
                    broadcastState();
                });
            });

            // Drag and Drop implementation
            let draggedRow = null;
            els.tbody.addEventListener('dragstart', (e) => {
                if(e.target.tagName === 'TR') {
                    draggedRow = e.target;
                    e.target.classList.add('dragging');
                }
            });
            
            els.tbody.addEventListener('dragend', (e) => {
                if(e.target.tagName === 'TR') {
                    e.target.classList.remove('dragging');
                    // Rebuild array based on DOM order
                    const newSegments = [];
                    els.tbody.querySelectorAll('tr').forEach(tr => {
                        const oldIdx = tr.dataset.index;
                        newSegments.push(AppState.segments[oldIdx]);
                    });
                    AppState.segments = newSegments;
                    
                    cascadeTimes(1); // Recalculate sequentially
                    
                    renderTable();
                    broadcastState();
                }
            });

            els.tbody.addEventListener('dragover', (e) => {
                e.preventDefault();
                const targetRow = e.target.closest('tr');
                if (targetRow && targetRow !== draggedRow) {
                    const rect = targetRow.getBoundingClientRect();
                    const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
                    els.tbody.insertBefore(draggedRow, next ? targetRow.nextSibling : targetRow);
                }
            });
        }

        function setupProgramControls() {
            // Add Row
            els.btnAddRow.addEventListener('click', () => {
                let lastEnd = "12:00:00";
                if (AppState.segments.length > 0) {
                    lastEnd = AppState.segments[AppState.segments.length - 1].end;
                }
                const newDur = "01:00:00";
                AppState.segments.push({
                    id: Date.now().toString(),
                    start: lastEnd,
                    end: secondsToTime(timeToSeconds(lastEnd) + timeToSeconds(newDur)),
                    title: 'Segment #1',
                    duration: newDur,
                    color: '#000000'
                });
                renderTable();
                broadcastState();
            });

            // Quick Next Logic: End current segment now, pull next segment start to now.
            els.btnQuickNext.addEventListener('click', () => {
                const nowSecs = getCurrentSeconds();
                let currentIndex = AppState.segments.findIndex(s => {
                    const sSec = timeToSeconds(s.start);
                    let eSec = timeToSeconds(s.end);
                    if (eSec <= sSec) eSec += 86400;
                    let nSec = nowSecs;
                    if (eSec > 86400 && nSec < (eSec - 86400)) nSec += 86400;
                    return sSec <= nSec && eSec > nSec;
                });
                
                if (currentIndex !== -1 && currentIndex < AppState.segments.length - 1) {
                    // Truncate current based on time
                    AppState.segments[currentIndex].end = secondsToTime(nowSecs);
                    
                    let sSec = timeToSeconds(AppState.segments[currentIndex].start);
                    let nSec = nowSecs;
                    if (nSec < sSec) nSec += 86400; // Cross-midnight edge case
                    AppState.segments[currentIndex].duration = secondsToTime(nSec - sSec);
                    
                    // Cascade updates everything after
                    cascadeTimes(currentIndex + 1);
                    renderTable();
                    broadcastState();
                } else if (currentIndex === -1 && AppState.segments.length > 0) {
                    // If before the first segment, snap the first one to NOW
                    const firstStart = timeToSeconds(AppState.segments[0].start);
                    if (nowSecs < firstStart) {
                        AppState.segments[0].start = secondsToTime(nowSecs);
                        AppState.segments[0].end = secondsToTime(nowSecs + timeToSeconds(AppState.segments[0].duration));
                        cascadeTimes(1);
                        renderTable();
                        broadcastState();
                    }
                }
            });

            // Message Toggle
            els.btnShowMsg.addEventListener('click', () => {
                AppState.showMessage = !AppState.showMessage;
                AppState.message = els.msgInput.value;
                
                if (AppState.showMessage) {
                    els.btnShowMsg.textContent = "HIDE";
                    els.btnShowMsg.classList.add('active');
                } else {
                    els.btnShowMsg.textContent = "SHOW";
                    els.btnShowMsg.classList.remove('active');
                }
                broadcastState();
            });

            // Color Presets Selection
            els.colorPresets.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    els.colorPresets.forEach(b => b.classList.remove('active'));
                    const target = e.currentTarget;
                    target.classList.add('active');
                    
                    AppState.messageBg = target.dataset.bg;
                    AppState.messageColor = target.dataset.color;
                    
                    if (!isLiveView) {
                        els.msgInput.style.backgroundColor = AppState.messageBg;
                        els.msgInput.style.color = AppState.messageColor;
                    }
                    
                    // Live update if message is currently shown
                    if (AppState.showMessage) broadcastState();
                });
            });

            // Message Input Realtime Sync (Optional, but good if SHOW is active)
            els.msgInput.addEventListener('input', () => {
                AppState.message = els.msgInput.value;
                if (AppState.showMessage) broadcastState();
            });
            
            // Editor Mode Logic
            let isEditorMode = false;
            els.btnEditorMode.addEventListener('click', () => {
                isEditorMode = !isEditorMode;
                const headerLine = "Start | End | Segment | Duration | Color Hex";
                
                if (isEditorMode) {
                    const lines = [headerLine, ...AppState.segments.map(s => `${s.start} | ${s.end} | ${s.title} | ${s.duration} | ${s.color || '#0a0a0a'}`)];
                    els.rawEditor.value = lines.join('\n');
                    els.tableResponsive.classList.add('hidden');
                    els.editorContainer.classList.remove('hidden');
                    els.btnEditorMode.textContent = "SAVE & CLOSE";
                    els.btnEditorMode.classList.add('filled', 'active');
                    els.btnEditorMode.classList.remove('outline');
                    els.btnAddRow.classList.add('hidden');
                } else {
                    const text = els.rawEditor.value;
                    const lines = text.split('\n').filter(l => l.trim().length > 0);
                    const newSegments = [];
                    lines.forEach(line => {
                        // Skip the header line on parsing
                        if (line.toLowerCase().includes('start |') && line.toLowerCase().includes('end |')) return; 
                        
                        const parts = line.split('|').map(p => p.trim());
                        if (parts.length >= 4) {
                            newSegments.push({ 
                                id: Date.now()+Math.random(), 
                                start: parts[0], 
                                end: parts[1], 
                                title: parts[2], 
                                duration: parts[3],
                                color: parts[4] || '#0a0a0a'
                            });
                        }
                    });
                    AppState.segments = newSegments;
                    cascadeTimes(1);
                    renderTable();
                    broadcastState();
                    
                    els.tableResponsive.classList.remove('hidden');
                    els.editorContainer.classList.add('hidden');
                    els.btnEditorMode.textContent = "EDITOR";
                    els.btnEditorMode.classList.remove('filled', 'active');
                    els.btnEditorMode.classList.add('outline');
                    els.btnAddRow.classList.remove('hidden');
                }
            });

            // File IO
            els.btnExport.addEventListener('click', () => {
                const headerLine = "Start | End | Segment | Duration | Color Hex";
                const lines = [headerLine, ...AppState.segments.map(s => `${s.start} | ${s.end} | ${s.title} | ${s.duration} | ${s.color || '#0a0a0a'}`)];
                const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rundown_${new Date().toISOString().slice(0,10)}.run`;
                a.click();
                URL.revokeObjectURL(url);
            });

            els.btnLoad.addEventListener('click', () => els.fileInput.click());
            
            els.fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const text = ev.target.result;
                    const lines = text.split('\n').filter(l => l.trim().length > 0);
                    const newSegments = [];
                    lines.forEach(line => {
                        // Skip the header line on parsing
                        if (line.toLowerCase().includes('start |') && line.toLowerCase().includes('end |')) return; 

                        const parts = line.split('|').map(p => p.trim());
                        if (parts.length >= 4) {
                            newSegments.push({ 
                                id: Date.now()+Math.random(), 
                                start: parts[0], 
                                end: parts[1], 
                                title: parts[2], 
                                duration: parts[3],
                                color: parts[4] || '#0a0a0a' // Fallback for files saved prior to color update
                            });
                        }
                    });
                    if(newSegments.length > 0) {
                        AppState.segments = newSegments;
                        cascadeTimes(1); // Enforce contiguity on load
                        renderTable();
                        broadcastState();
                    }
                };
                reader.readAsText(file);
                els.fileInput.value = ''; // reset
            });

            // Present Button (Open Popup)
            els.btnPresent.addEventListener('click', () => {
                const currentUrl = new URL(window.location.href);
                currentUrl.searchParams.set('view', 'live');
                // Open new window. Browsers usually allow this on user interaction.
                window.open(currentUrl.href, 'RunDownLiveWindow', 'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no');
                
                // Ensure current state is broadcasted slightly after open to sync
                setTimeout(broadcastState, 1000); 
            });
        }

        // --- KEYBOARD SHORTCUTS ---
        window.addEventListener('keydown', (e) => {
            // Check if window is active
            if (!document.hasFocus()) return;
            // Check if user is typing in an input field
            const activeTag = document.activeElement ? document.activeElement.tagName : '';
            if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;

            switch (e.key.toLowerCase()) {
                case 'q':
                    e.preventDefault();
                    if (isLiveView) {
                        syncChannel.postMessage({ type: 'COMMAND_QUICK_NEXT' });
                    } else {
                        els.btnQuickNext.click();
                    }
                    break;
                case 'p':
                    e.preventDefault();
                    if (!isLiveView) els.btnPresent.click();
                    break;
                case '1':
                    e.preventDefault();
                    if (isLiveView) {
                        syncChannel.postMessage({ type: 'COMMAND_TOGGLE_MSG' });
                    } else {
                        els.btnShowMsg.click();
                    }
                    break;
            }
        });

        // --- LIVE VIEW LOGIC (Receiver) ---
        
        function updateLiveUIFromState(state) {
            AppState.segments = state.segments;
            
            if (state.showMessage && state.message.trim() !== '') {
                els.lMsgContainer.classList.add('msg-visible');
                
                // Apply color states
                els.lMsgContainer.style.backgroundColor = state.messageBg || '#b10000';
                els.lMsgContainer.style.color = state.messageColor || '#ffffff';

                // Only parse/update if changed to avoid breaking marquee mid-scroll
                if (els.lMarquee.dataset.raw !== state.message) {
                    els.lMarquee.dataset.raw = state.message;
                    els.lMarquee.innerHTML = parseMarkdown(state.message);
                    
                    // Reset animation states to measure width
                    els.lMarquee.className = 'marquee-content static-measure';
                    els.lMarquee.style.animation = 'none';
                    
                    // Measure and apply proper class next frame
                    requestAnimationFrame(() => {
                        const containerWidth = els.lMsgContainer.clientWidth;
                        const textWidth = els.lMarquee.scrollWidth;
                        
                        if (textWidth > containerWidth) {
                            els.lMarquee.className = 'marquee-content marquee-active';
                            els.lMarquee.style.animation = ''; // Restore CSS animation
                        } else {
                            els.lMarquee.className = 'marquee-content marquee-static';
                        }
                    });
                }
            } else {
                els.lMsgContainer.classList.remove('msg-visible');
            }
        }

        // --- INITIALIZATION ---
        
        function initApp() {
            if (isLiveView) {
                // Setup Live View
                document.title = "RunDown - LIVE";
                els.progView.classList.add('hidden');
                els.liveView.classList.remove('hidden');
                els.liveView.style.display = 'flex'; // override default
                
                // Listen for sync
                syncChannel.onmessage = (event) => {
                    if (event.data.type === 'STATE_UPDATE') {
                        updateLiveUIFromState(event.data.payload);
                    }
                };
                
                // Request initial state (Optional: assumes Program view is open and will broadcast on load)
                syncChannel.postMessage({ type: 'REQUEST_STATE' });
                
            } else {
                // Setup Program View
                loadStateFromStorage();
                
                // Init message box state
                els.msgInput.value = AppState.message;
                if (AppState.showMessage) {
                    els.btnShowMsg.textContent = "HIDE";
                    els.btnShowMsg.classList.add('active');
                }

                // Init color presets state
                let hasActiveColor = false;
                els.colorPresets.forEach(btn => {
                    if (btn.dataset.bg === AppState.messageBg) {
                        btn.classList.add('active');
                        hasActiveColor = true;
                    } else {
                        btn.classList.remove('active');
                    }
                });
                // Fallback if no matching preset (Defaults to White)
                if (!hasActiveColor && els.colorPresets.length > 0) {
                    const whiteBtn = Array.from(els.colorPresets).find(b => b.dataset.bg === '#ffffff') || els.colorPresets[0];
                    whiteBtn.classList.add('active');
                    AppState.messageBg = whiteBtn.dataset.bg;
                    AppState.messageColor = whiteBtn.dataset.color;
                }
                
                // Apply color to message input
                els.msgInput.style.backgroundColor = AppState.messageBg;
                els.msgInput.style.color = AppState.messageColor;

                renderTable();
                setupProgramControls();
                
                // Listen for requests from newly opened live windows
                syncChannel.onmessage = (event) => {
                    if (event.data.type === 'REQUEST_STATE') {
                        broadcastState();
                    } else if (event.data.type === 'COMMAND_QUICK_NEXT') {
                        els.btnQuickNext.click();
                    } else if (event.data.type === 'COMMAND_TOGGLE_MSG') {
                        els.btnShowMsg.click();
                    }
                };
                
                // Initial broadcast
                broadcastState();
            }

            // Start clock engine
            requestAnimationFrame(updateClockLoop);
        }

        // Boot
        initApp();
    </script>
</body>
</html>
